name: Image Build and Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-scan:
    name: build-and-scan (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: read    # This is required for checking out the code
      id-token: write   # This is required for authentication to GitHub Container Registry
      packages: write   # This is required for pushing images to GitHub Container Registry
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - name: Get commit SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          platforms: linux/${{ matrix.platform }}
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}-${{ matrix.platform }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # 0.30.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}-${{ matrix.platform }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      
      - name: Push Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}-${{ matrix.platform }}


  publish-manifest:
    name: publish-manifest
    needs: build-and-scan
    permissions:
      contents: read    # This is required for checking out the code
      id-token: write   # This is required for authentication to GitHub Container Registry
      packages: write   # This is required for pushing images to GitHub Container Registry
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Get commit SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=sha

      - name: Login to GitHub Packages
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |                    
          docker manifest create ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }} \
            ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}-arm64          
          docker manifest push ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short }}
